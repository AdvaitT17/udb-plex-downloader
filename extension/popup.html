<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: system-ui, sans-serif; width: 340px; padding: 12px; margin: 0; }
      h2 { font-size: 13px; margin: 12px 0 6px 0; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
      h2:first-child { margin-top: 0; }
      .job, .watch { border-bottom: 1px solid #eee; padding: 6px 0; font-size: 12px; }
      .job .name, .watch .name { font-weight: 600; }
      .job .meta, .watch .meta { color: #666; font-size: 11px; }
      .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; color: #fff; }
      .badge.queued  { background: #888; }
      .badge.running { background: #ff9800; }
      .badge.done    { background: #4caf50; }
      .badge.failed  { background: #f44336; }
      code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
      .watch .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .watch button {
        background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px;
        padding: 2px 8px; font-size: 11px; cursor: pointer;
      }
      .watch button:hover { background: #ffecec; border-color: #f44336; color: #f44336; }
      #rescan-btn {
        background: #e50914; color: #fff; border: none; border-radius: 4px;
        padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 8px;
      }
      #rescan-btn:hover { background: #ff2b36; }
      #rescan-btn:disabled { opacity: 0.6; cursor: progress; }
    </style>
  </head>
  <body>
    <h2>Recent jobs</h2>
    <div id="jobs">Loading…</div>

    <div style="margin-top: 10px;">
      <a id="dashboard-link" target="_blank" href="#"
         style="font-size: 12px; color: #e50914; font-weight: 600; text-decoration: none;">
        Open full dashboard →
      </a>
    </div>

    <h2 style="display: flex; align-items: center; justify-content: space-between;">
      <span>Watching <span id="rescan-at" style="color:#888; font-size:11px; text-transform: none; font-weight: normal;"></span></span>
      <button id="rescan-btn" title="Trigger a rescan of all watched shows right now">Rescan now</button>
    </h2>
    <div id="watches">Loading…</div>

    <script src="popup.js"></script>
  </body>
</html>
